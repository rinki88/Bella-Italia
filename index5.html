<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reserve Table</title>
</head>

<body>
  <h1> Bella Italia</h1>
  <form action="mailto:pndt.rinki@gmail.com" method="post" ectype="plain/text">
    <label> Name: </label>
    <input type="text" name="name">
    <br>
    <br>
    <label> Booking date : </label>
    <input type="date" name="date">
    <br>
    <br>
    <label> Booking time : </label>
    <input type="time" name="time">
    <br>
    <br>
    <label>For how many people:</label>
    <input type="number" name="people">
    <br>
    <br>
    <label>Special occasion: </label>
    <select type="order" name="occasion">
      <option value="birthday"> Birthday </option>
      <option value="marriage anniversaries"> Marriage Anniversaries </option>
      <option type="valentine's day"> Valentine's Day</option>
      <option value="mother's day"> Mother's Day</option>
    </select>
    <br>
    <br>
    <label>write your other wishes</label>
    <br>
    <textarea rows="10px" cols="30px"></textarea>
    <br>
    <input type="submit">
  
  </form>
  
</body>

</html>
